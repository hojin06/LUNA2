# =============================================================================
# LUNA2 — 경로 설정 (single source of truth)
# =============================================================================
# 데이터셋 / 가중치 / 체크포인트의 *유일한* 경로 정의 파일.
#
# 규칙
# ----
# * `root` 한 곳만 수정하면 하위 모든 경로가 따라간다. (절대경로 기준)
# * 모든 하위 항목은 `root` 기준 **상대경로**로 적는다. 로더
#   (src/utils/paths.py::load_paths) 가 root 와 합쳐 절대 Path 로 해석한다.
# * 데이터/가중치/모델은 절대 복사하지 않는다 — 원본 위치를 그대로 참조.
#
# 다른 머신으로 옮길 때는 아래 `root` 한 줄만 바꾸면 된다.
# =============================================================================

# 원본 LUNA 프로젝트(SmallSizePM_GAN_model)의 루트. 여기만 고치면 됨.
root: "c:/대학교/LUNA_paperWORKS/SmallSizePM_GAN_model"

# --- 데이터셋 (root 기준 상대경로) -------------------------------------------
datasets:
  exdark:      "DataSet/ExDark"        # images/, annotations/, imageclasslist.txt
  lol_v1:      "DataSet/LOLdataset"    # eval15/, our485/  ({low,high})
  lol_v2:      "DataSet/LOL-v2"        # Real_captured/, Synthetic/ ({Train,Test}/{Low,Normal})
  loli_street: "DataSet/LoLI-Street"   # train/, val/, test/  ({low,high})

# --- 가중치 (root 기준 상대경로) ---------------------------------------------
weights:
  # frozen YOLOv8n (COCO pretrained) — ExDark 검출 평가용. 학습/수정 금지.
  yolov8n:       "CODES/yolov8n.pt"

  # --- 원본 LUNA generator 체크포인트 (hybrid_v1, Stage2 best) ---
  # 두 변종을 분리 등록. 학습 데이터는 checkpoint 메타데이터(args.dataset)로 확인.
  #
  #  · luna_lolv2   : LOL-v2 Real 학습 (dataset=lol_v2_real, best_psnr 20.87).
  #                   ExDark Test 7363장 mAP@0.5 = 0.2815 (전체 실측, eval_detection.py).
  #  · luna_loli30k : LoLI-Street 30K 학습 (dataset=loli_street_mix, val_psnr 26.75).
  #                   ExDark Test mAP@0.5 ≈ 0.346
  #                   (근거: experiments/results/exdark_multi/multi_model_comparison.csv
  #                          LUNA overall ap50=0.346211; exdark/detection_comparison.csv
  #                          enh_ap50=0.345604).
  luna_lolv2:    "CODES/checkpoints/ext_lol_v2_real_stage2_best.pth"
  luna_loli30k:  "CODES/checkpoints/loli_street_30000_stage2_best.pth"
  # 하위 호환 별칭 (기존 스크립트 기본값). = luna_lolv2 (0.282).
  luna_original: "CODES/checkpoints/ext_lol_v2_real_stage2_best.pth"

# --- LUNA2 산출물 (이 디렉터리 기준; 학습/실험 결과 저장 위치) ----------------
# 상대경로면 LUNA2/ 루트 기준으로 해석된다 (runs/ 는 .gitignore 처리됨).
outputs:
  runs: "runs"

# --- Phase 2 (detection-aware) 베이스 체크포인트 (LUNA2 루트 기준 상대경로) ----
# P1 결과: guidefix(guidance 붕괴 수정본) ≈ fixed 동등 (ExDark native mAP@0.5
# 0.3984 vs 0.3977) 이나 guidance z축 정상화로 P2 base 로 guidefix 를 채택.
# fixed 는 runs/bilateral_phase1_l1only_fixed/ 에 보관(삭제 금지).
phase2:
  base_checkpoint: "runs/bilateral_phase1_l1only_guidefix/checkpoints/last.pth"  # P2 시작점
  archived_fixed:  "runs/bilateral_phase1_l1only_fixed/checkpoints/last.pth"     # 보관
